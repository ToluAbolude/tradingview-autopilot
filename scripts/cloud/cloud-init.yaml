#cloud-config
# =============================================================================
#  TradingMCP — Oracle Cloud VM Cloud-Init Script
#  Ubuntu 22.04 ARM (VM.Standard.A1.Flex — Always Free)
#
#  PASTE THIS into:
#    Oracle Cloud → Create Instance → Advanced Options → Cloud-Init Script
#
#  What this does on first boot (~8 min):
#    1. Sets timezone to Europe/London
#    2. Installs Node.js 20, Chromium, Xvfb, x11vnc, fluxbox, git, curl
#    3. Writes all TradingMCP scripts + systemd service to disk
#    4. Enables tv_browser.service (auto-starts Chromium on boot)
#    5. Installs all 5 trading session cron jobs
#    6. Clones the project repo (if REPO_URL is set below)
#    7. Writes init log to /var/log/tradingmcp_init.log
#
#  AFTER FIRST BOOT — only 2 steps remain:
#    1. SSH in and run: npm install  (inside project dir)
#    2. Run: bash scripts/cloud/setup_login_vnc.sh  (log in to TradingView once)
#
#  OPTIONAL: set your GitHub repo URL below to auto-clone on boot.
# =============================================================================

timezone: Europe/London

package_update: true
package_upgrade: false
package_reboot_if_required: false

packages:
  - curl
  - git
  - wget
  - unzip
  - xvfb
  - x11vnc
  - fluxbox
  - snapd
  - fonts-liberation
  - libnss3
  - libatk1.0-0
  - libatk-bridge2.0-0
  - libcups2
  - libdrm2
  - libgbm1
  - libxkbcommon0
  - libxcomposite1
  - libxdamage1
  - libxfixes3
  - libxrandr2
  - libpango-1.0-0
  - libcairo2
  - libasound2

write_files:

  # ---------------------------------------------------------------------------
  #  Systemd service — keeps Xvfb + Chromium alive across reboots
  # ---------------------------------------------------------------------------
  - path: /etc/systemd/system/tv_browser.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=TradingMCP - TradingView Web Browser (Xvfb + Chromium)
      After=network-online.target snapd.service
      Wants=network-online.target
      StartLimitIntervalSec=120
      StartLimitBurst=3

      [Service]
      Type=simple
      User=ubuntu
      Group=ubuntu
      WorkingDirectory=/home/ubuntu/tradingview-autopilot

      ExecStart=/bin/bash /home/ubuntu/tradingview-autopilot/scripts/cloud/launch_tv_chromium.sh
      ExecStop=/bin/bash -c 'pkill -f "remote-debugging-port=9222" || true; pkill -f "Xvfb :99" || true'

      Restart=on-failure
      RestartSec=15s

      Environment=HOME=/home/ubuntu
      Environment=USER=ubuntu
      Environment=DISPLAY=:99

      TimeoutStartSec=90
      TimeoutStopSec=30

      StandardOutput=journal
      StandardError=journal
      SyslogIdentifier=tv_browser

      [Install]
      WantedBy=multi-user.target

  # ---------------------------------------------------------------------------
  #  Cloud config — paths and env vars shared by all scripts
  # ---------------------------------------------------------------------------
  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/cloud_config.sh
    owner: ubuntu:ubuntu
    permissions: '0644'
    content: |
      # Auto-generated by cloud-init — paths for TradingMCP cloud scripts
      export CHROMIUM_BIN="/snap/bin/chromium"
      export TV_PROJECT_DIR="/home/ubuntu/tradingview-autopilot"
      export TV_CDP_PORT="9222"
      export TV_DISPLAY=":99"
      export TV_PROFILE_DIR="/home/ubuntu/.config/chromium-trading"

  # ---------------------------------------------------------------------------
  #  Launch script — starts Xvfb then Chromium pointing at TradingView
  # ---------------------------------------------------------------------------
  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/launch_tv_chromium.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      set -e
      SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
      source "$SCRIPT_DIR/cloud_config.sh"
      LOG_DIR="$TV_PROJECT_DIR/data/trade_log/scheduler_logs"
      mkdir -p "$LOG_DIR" "$TV_PROFILE_DIR"

      pkill -f "Xvfb $TV_DISPLAY" 2>/dev/null || true
      pkill -f "remote-debugging-port=$TV_CDP_PORT" 2>/dev/null || true
      sleep 1

      Xvfb "$TV_DISPLAY" -screen 0 1920x1080x24 -ac +extension GLX +render -noreset &
      XVFB_PID=$!
      sleep 2
      kill -0 $XVFB_PID 2>/dev/null || { echo "[launch] Xvfb failed"; exit 1; }

      export DISPLAY="$TV_DISPLAY"
      $CHROMIUM_BIN \
        --remote-debugging-port=$TV_CDP_PORT \
        --remote-debugging-address=127.0.0.1 \
        --user-data-dir="$TV_PROFILE_DIR" \
        --no-sandbox \
        --disable-dev-shm-usage \
        --disable-gpu \
        --no-first-run \
        --no-default-browser-check \
        --disable-extensions \
        --disable-translate \
        --disable-sync \
        --window-size=1920,1080 \
        "https://www.tradingview.com/chart/" \
        >> "$LOG_DIR/chromium.log" 2>&1 &

      CHROMIUM_PID=$!
      MAX_WAIT=60
      COUNT=0
      until curl -sf "http://127.0.0.1:$TV_CDP_PORT/json/version" > /dev/null 2>&1; do
        sleep 2; COUNT=$((COUNT+2))
        [ $COUNT -ge $MAX_WAIT ] && { echo "[launch] CDP timeout"; exit 1; }
      done
      echo "[launch] CDP ready — TradingView loading (pid $CHROMIUM_PID)"
      wait $XVFB_PID

  # ---------------------------------------------------------------------------
  #  VNC login helper — used once to authenticate TradingView + BlackBull
  # ---------------------------------------------------------------------------
  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/setup_login_vnc.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
      source "$SCRIPT_DIR/cloud_config.sh"
      pgrep -f "Xvfb $TV_DISPLAY" > /dev/null || { Xvfb "$TV_DISPLAY" -screen 0 1920x1080x24 -ac &; sleep 2; }
      export DISPLAY="$TV_DISPLAY"
      pgrep fluxbox > /dev/null || { fluxbox &>/dev/null & sleep 1; }
      VNC_PASS_FILE=$(mktemp)
      echo "Enter a temporary VNC password (min 6 chars):"
      read -s VNC_PASS
      echo "$VNC_PASS" | x11vnc -storepasswd "$VNC_PASS" "$VNC_PASS_FILE" 2>/dev/null
      x11vnc -display "$TV_DISPLAY" -rfbauth "$VNC_PASS_FILE" -rfbport 5900 -forever -bg -quiet
      echo ""
      echo "====================================================="
      echo "  On your LOCAL machine open a NEW terminal and run:"
      echo "    ssh -L 5900:localhost:5900 ubuntu@<your-vm-ip>"
      echo "  Then connect VNC viewer to: localhost:5900"
      echo ""
      echo "  In the browser:"
      echo "    1. Log in to TradingView"
      echo "    2. Connect BlackBull Markets broker"
      echo "    3. Confirm bid/ask prices visible on chart"
      echo "====================================================="
      echo ""
      read -p "Press ENTER when done..."
      pkill x11vnc 2>/dev/null || true
      rm -f "$VNC_PASS_FILE"
      echo "Login saved. VNC closed."

  # ---------------------------------------------------------------------------
  #  Service control helpers
  # ---------------------------------------------------------------------------
  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/remove_services.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      [ "$EUID" -ne 0 ] && exec sudo bash "$0" "$@"
      systemctl stop    tv_browser 2>/dev/null; echo "stopped"
      systemctl disable tv_browser 2>/dev/null; echo "disabled"
      rm -f /etc/systemd/system/tv_browser.service
      systemctl daemon-reload
      echo "Service removed. To reinstall: sudo bash scripts/cloud/install_services.sh"

  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/install_services.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      [ "$EUID" -ne 0 ] && exec sudo bash "$0" "$@"
      SERVICE_SRC="/home/ubuntu/tradingview-autopilot/scripts/cloud/tv_browser.service"
      cp "$SERVICE_SRC" /etc/systemd/system/tv_browser.service
      systemctl daemon-reload
      systemctl enable tv_browser
      systemctl start  tv_browser
      sleep 5
      systemctl is-active tv_browser && echo "Service RUNNING" || echo "Check: journalctl -u tv_browser -n 30"

  # ---------------------------------------------------------------------------
  #  Cron management helpers
  # ---------------------------------------------------------------------------
  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/install_cron_linux.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      PROJECT_DIR="/home/ubuntu/tradingview-autopilot"
      NODE_BIN="$(command -v node)"
      LOG_DIR="$PROJECT_DIR/data/trade_log/scheduler_logs"
      SCRIPT="$PROJECT_DIR/scripts/trading/session_runner.mjs"
      mkdir -p "$LOG_DIR"
      CMD="cd $PROJECT_DIR && $NODE_BIN $SCRIPT >> $LOG_DIR/session_\$(date +\%Y\%m\%d_\%H\%M).log 2>&1"
      BLOCK="# TradingMCP sessions (Europe/London time)
      SHELL=/bin/bash
      PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin
      7 1 * * *   $CMD
      7 9 * * 1-5 $CMD
      7 14 * * 1-5 $CMD
      3 18 * * 1-5 $CMD
      3 4 * * 0   $CMD
      # END TradingMCP"
      CURRENT=$(crontab -l 2>/dev/null | grep -v "TradingMCP\|session_runner" || true)
      (echo "$CURRENT"; echo ""; echo "$BLOCK") | crontab -
      echo "Cron jobs installed:"; crontab -l | grep -E "TradingMCP|session_runner|Asian|London|NY|Research" || true

  - path: /home/ubuntu/tradingview-autopilot/scripts/cloud/remove_cron_linux.sh
    owner: ubuntu:ubuntu
    permissions: '0755'
    content: |
      #!/bin/bash
      CLEANED=$(crontab -l 2>/dev/null | grep -v "TradingMCP\|session_runner" || true)
      echo "$CLEANED" | crontab -
      echo "TradingMCP cron jobs removed."

  # ---------------------------------------------------------------------------
  #  Startup marker — confirms cloud-init completed
  # ---------------------------------------------------------------------------
  - path: /etc/tradingmcp_cloud_init_complete
    owner: root:root
    permissions: '0444'
    content: |
      TradingMCP cloud-init completed successfully.
      Check /var/log/tradingmcp_init.log for details.

runcmd:
  # ---------------------------------------------------------------------------
  #  Log all output
  # ---------------------------------------------------------------------------
  - exec > /var/log/tradingmcp_init.log 2>&1

  # ---------------------------------------------------------------------------
  #  1. Node.js 20 LTS via NodeSource
  # ---------------------------------------------------------------------------
  - echo "[1/7] Installing Node.js 20..."
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - node -v
  - npm -v

  # ---------------------------------------------------------------------------
  #  2. Chromium via snap (ARM-compatible, always latest)
  # ---------------------------------------------------------------------------
  - echo "[2/7] Installing Chromium via snap..."
  - snap wait system seed.loaded
  - snap install chromium
  - /snap/bin/chromium --version

  # ---------------------------------------------------------------------------
  #  3. Directory structure
  # ---------------------------------------------------------------------------
  - echo "[3/7] Creating directories..."
  - mkdir -p /home/ubuntu/tradingview-autopilot/data/trade_log/scheduler_logs
  - mkdir -p /home/ubuntu/tradingview-autopilot/data/knowledge_base
  - mkdir -p /home/ubuntu/tradingview-autopilot/screenshots
  - mkdir -p /home/ubuntu/tradingview-autopilot/strategies
  - mkdir -p /home/ubuntu/.config/chromium-trading
  - chown -R ubuntu:ubuntu /home/ubuntu/tradingview-autopilot
  - chown -R ubuntu:ubuntu /home/ubuntu/.config/chromium-trading

  # ---------------------------------------------------------------------------
  #  4. Clone project repo (EDIT URL OR REMOVE THIS BLOCK)
  #     If you prefer to copy files manually via scp, delete these 3 lines.
  # ---------------------------------------------------------------------------
  - echo "[4/7] Cloning project repo..."
  - |
    REPO_URL="https://github.com/YOUR_GITHUB_USERNAME/tradingview-autopilot.git"
    INSTALL_DIR="/home/ubuntu/tradingview-autopilot"
    if [ "$REPO_URL" != "https://github.com/YOUR_GITHUB_USERNAME/tradingview-autopilot.git" ]; then
      if [ -d "$INSTALL_DIR/.git" ]; then
        sudo -u ubuntu git -C "$INSTALL_DIR" pull --quiet
      else
        sudo -u ubuntu git clone "$REPO_URL" "$INSTALL_DIR"
      fi
      cd "$INSTALL_DIR" && sudo -u ubuntu npm install --quiet
      echo "[4/7] Repo cloned and npm install done."
    else
      echo "[4/7] SKIP: No REPO_URL set. Copy files manually after boot:"
      echo "      scp -r ./tradingview-autopilot ubuntu@<vm-ip>:~/"
      echo "      Then SSH in and run: cd ~/tradingview-autopilot && npm install"
    fi

  # ---------------------------------------------------------------------------
  #  5. Enable systemd service (starts on next boot / after npm install)
  # ---------------------------------------------------------------------------
  - echo "[5/7] Enabling tv_browser systemd service..."
  - systemctl daemon-reload
  - systemctl enable tv_browser
  - echo "[5/7] Service enabled (will start on boot and after npm install)"

  # ---------------------------------------------------------------------------
  #  6. Install cron jobs
  # ---------------------------------------------------------------------------
  - echo "[6/7] Installing cron jobs..."
  - |
    PROJECT_DIR="/home/ubuntu/tradingview-autopilot"
    NODE_BIN="/usr/bin/node"
    LOG_DIR="$PROJECT_DIR/data/trade_log/scheduler_logs"
    SCRIPT="$PROJECT_DIR/scripts/trading/session_runner.mjs"
    CMD="cd $PROJECT_DIR && $NODE_BIN $SCRIPT >> $LOG_DIR/session_\$(date +\%Y\%m\%d_\%H\%M).log 2>&1"
    CRON_BLOCK="# TradingMCP sessions (Europe/London time)
    SHELL=/bin/bash
    PATH=/usr/local/sbin:/usr/local/bin:/sbin:/bin:/usr/sbin:/usr/bin
    7 1 * * *    $CMD
    7 9 * * 1-5  $CMD
    7 14 * * 1-5 $CMD
    3 18 * * 1-5 $CMD
    3 4 * * 0    $CMD
    # END TradingMCP"
    echo "$CRON_BLOCK" | crontab -u ubuntu -
    echo "[6/7] Cron jobs installed for user ubuntu"

  # ---------------------------------------------------------------------------
  #  7. Summary
  # ---------------------------------------------------------------------------
  - echo "[7/7] Cloud-init complete."
  - echo ""
  - echo "========================================"
  - echo "  TradingMCP VM is ready."
  - echo "========================================"
  - echo ""
  - echo "NEXT STEPS (SSH in to complete):"
  - echo ""
  - echo "  If you skipped the git clone above:"
  - echo "    scp -r ./tradingview-autopilot ubuntu@<vm-ip>:~/"
  - echo "    cd ~/tradingview-autopilot && npm install"
  - echo ""
  - echo "  Start the browser service:"
  - echo "    sudo systemctl start tv_browser"
  - echo "    curl http://localhost:9222/json/version"
  - echo ""
  - echo "  Log in to TradingView (ONE TIME ONLY):"
  - echo "    bash scripts/cloud/setup_login_vnc.sh"
  - echo ""
  - echo "  Verify a session run:"
  - echo "    node scripts/trading/session_runner.mjs"
  - echo ""
  - echo "  Check cron:"
  - echo "    crontab -l"
  - echo ""
  - echo "  Logs:"
  - echo "    journalctl -u tv_browser -f"
  - echo "    tail -f ~/tradingview-autopilot/data/trade_log/scheduler_logs/*.log"
  - echo ""
  - timedatectl
  - node -v
  - crontab -u ubuntu -l

final_message: |
  TradingMCP cloud-init finished in $UPTIME seconds.
  Full log: /var/log/tradingmcp_init.log
  Marker:   /etc/tradingmcp_cloud_init_complete
